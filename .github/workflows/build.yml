name: Build BTLoader
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v3
    
    - name: Debug Build
      run: |
        git clone https://github.com/theos/theos.git ~/theos
        mkdir -p ~/theos/sdks
        cd ~/theos/sdks
        wget https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS13.7.sdk.tar.xz
        tar -xf iPhoneOS13.7.sdk.tar.xz
        cd 
        export THEOS=~/theos
        echo "=== FILES ==="
        find . -name "*.m" -o -name "*.x" -o -name "Makefile"
        echo "=== BUILD ==="
        make SDK=iphoneos13.7 2>&1 | tee build.log
        echo "=== RESULTS ==="
        find . -name "*.dylib" || echo "NO DYLIB"
        ls -la obj/ || echo "NO OBJ"
        cat build.log
        
    - name: Upload All
      uses: actions/upload-artifact@v3
      with:
        name: debug
        path: |
          build.log
          obj/
          .theos/
        retention-days: 1
