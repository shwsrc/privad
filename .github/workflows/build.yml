name: Build BTLoader
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install and Build
      run: |
        git clone https://github.com/theos/theos.git ~/theos
        mkdir -p ~/theos/sdks
        cd ~/theos/sdks
        wget https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS13.7.sdk.tar.xz
        tar -xf iPhoneOS13.7.sdk.tar.xz
        cd 
        export THEOS=~/theos
        make SDK=iphoneos13.7 2>&1 | tee build.log || true
        find . -name "*.dylib" -exec cp {} /tmp/ \; || true
        
    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: BTLoader
        path: /tmp/
        if-no-files-found: warn
