name: Build BTLoader
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Theos
      run: |
        git clone https://github.com/theos/theos.git ~/theos
        mkdir -p ~/theos/sdks
        cd ~/theos/sdks
        wget https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS13.7.sdk.tar.xz
        tar -xf iPhoneOS13.7.sdk.tar.xz
        
    - name: Build
      run: |
        export THEOS=~/theos
        cd 
        make clean || true
        make SDK=iphoneos13.7 || true
        
    - name: Find and Upload
      run: |
        find . -name "*.dylib" -type f
        mkdir -p artifacts
        find . -name "*.dylib" -type f -exec cp {} artifacts/ \;
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: BTLoader
        path: artifacts/
