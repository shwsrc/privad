name: Build BTLoader
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Theos
      run: |
        git clone https://github.com/theos/theos.git ~/theos
        mkdir -p ~/theos/sdks
        cd ~/theos/sdks
        wget https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS13.7.sdk.tar.xz
        tar -xf iPhoneOS13.7.sdk.tar.xz
        
    - name: Build
      run: |
        export THEOS=~/theos
        cd 
        make clean || true
        make SDK=iphoneos13.7 || true
        
    - name: Find and Upload
      run: |
        find . -name "*.dylib" -type f || true
        mkdir -p artifacts || true
        find . -name "*.dylib" -type f -exec cp {} artifacts/ \; || true
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BTLoader
        path: artifacts/
